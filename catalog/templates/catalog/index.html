{% extends 'base.html' %}

{% block content %}
<h1>Каталог товаров</h1>

<div class="products">
    {% for product in products %}
        <div class="card">
            <img src="{{ product.image.url }}" alt="{{ product.name }}">
            <h3>{{ product.name }}</h3>
            <p>{{ product.description|truncatechars:100 }}</p>
            <a href="{% url 'catalog:product_detail' product.pk %}">Подробнее</a>
        </div>
    {% endfor %}
</div>
{% endblock %}
