{% extends 'base.html' %}

{% block content %}
<h1>{{ blog.title }}</h1>

{% if blog.preview %}
    <img src="{{ blog.preview.url }}" width="400">
{% endif %}

<p>{{ blog.content }}</p>

<p>Дата создания: {{ blog.created_at }}</p>
<p>Просмотры: {{ blog.views_count }}</p>

<a href="{% url 'blog:blog_update' blog.pk %}">Редактировать</a> |
<a href="{% url 'blog:blog_delete' blog.pk %}">Удалить</a> |
<a href="{% url 'blog:blog_list' %}">Назад к списку</a>

{% endblock %}
